server:
  port: 8080

spring:
  datasource:
    # Matches docker-compose service
    url: jdbc:mysql://localhost:3306/pangyan's world?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  sql:
    init:
      mode: always
      encoding: UTF-8


  redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      password: 123456
    
  elasticsearch:
      uris: http://localhost:9202

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

# DeepSeek / AI Configuration
deepseek:
  api:
    # 替换为你的 DeepSeek API Key，或在环境变量中设置 DEEPSEEK_API_KEY
    # 从环境变量读取，如果没有则使用默认值（请替换为你的真实 API Key）
    key: ${DEEPSEEK_API_KEY:sk-e10d9e3f4e6141be8f77c076c6b72514}
    url: https://api.deepseek.com/chat/completions
    model: deepseek-chat
    timeout: 60 

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sakuraverse.backend.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.sakuraverse.backend.mapper: debug